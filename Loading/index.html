<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #080714;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #loader {
            position: fixed;
            inset: 0;
            transition: opacity 1.2s ease;
        }

        #loader.done {
            opacity: 0;
            pointer-events: none;
        }

        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ── Labels ── */
        .lbl {
            position: absolute;
            background: rgba(8, 7, 22, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 5px 16px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.6px;
            color: rgba(255, 255, 255, 0.88);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            z-index: 5;
            text-transform: uppercase;
        }

        .lbl.on {
            opacity: 1;
            transform: translateY(0);
        }

        /* sub-label (smaller badge below a node) */
        .lbl.sub {
            font-size: 8.5px;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 200px;
            white-space: normal;
            text-align: center;
            line-height: 1.5;
            border-radius: 10px;
            padding: 6px 14px;
        }

        /* ── HUD ── */
        #hud {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 22px;
            background: rgba(8, 7, 22, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(14px);
            border-radius: 14px;
            padding: 14px 28px;
            min-width: 520px;
            z-index: 10;
        }

        .hc {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hl {
            font-size: 8px;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.38);
            font-weight: 600;
        }

        .hv {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.4px;
            color: #fff;
        }

        .hv.c {
            color: #00eeff;
            text-shadow: 0 0 10px #00eeff;
        }

        .hv.g {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        #hud-mid {
            flex: 1;
        }

        .track {
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: visible;
            position: relative;
        }

        .fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, #00eeff, #c060ff, #ff3d60);
            box-shadow: 0 0 10px #00eeff, 0 0 20px #c060ff;
            transition: width 0.12s linear;
            position: relative;
        }

        .fill::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 50%;
            transform: translateY(-50%);
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 8px #00eeff, 0 0 18px #00eeff;
        }
    </style>
</head>

<body>
    <div id="loader">
        <canvas id="canvas"></canvas>

        <!-- Labels — positioned by JS -->
        <!-- Node 0: left, cyan -->
        <div class="lbl" id="l0">PHASE 1. THE SIGNAL: CONNECTING YOUR TOOLS</div>

        <!-- Node 1: top-center, red -->
        <div class="lbl" id="l1">THE INTELLIGENCE: AI HEALTH ANALYSIS</div>

        <!-- Node 2: center, cyan -->
        <div class="lbl" id="l2">THE DETECTION: RISK &amp; BLOCKER SCANNING</div>

        <!-- Node 3: bottom-left, purple -->
        <div class="lbl" id="l3">THE RESPONSE: SLACK ALERTS &amp; ACTIONS</div>

        <!-- Node 4: right, green -->
        <div class="lbl" id="l4">FROM JIRA TO GITHUB TO SLACK — ONE UNIFIED VIEW</div>

    </div>

    <script src="script.js"></script>
</body>

</html>
